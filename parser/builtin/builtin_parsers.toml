# Built-in parsers for known commands.
# Entries are tested in order; first command_regex match wins.
# command_regex is matched against the full command string.

[[parsers]]
command_regex = '^weka status -J'
type          = "jq"
expression    = ".progress * 100"

[[parsers]]
command_regex = '^weka status'
type          = "regex"
pattern       = '(Data redistribution in progress|Rebuild in progress) \((\d+(?:\.\d+)?)%\)'
group         = 2

[[parsers]]
command_regex = '^weka cluster task'
type          = "regex"
# Matches the PROGRESS column, which is always followed by True/False (USER PAUSED).
# Covers plain invocations and grepped variants, e.g.:
#   weka cluster task | grep -w 984
#   weka cluster task | grep -w FSCK
pattern       = '(\d+(?:\.\d+)?)\s+(?:True|False)'
group         = 1
estimator     = "ema"

[[parsers]]
command_regex = '^btrfs scrub status'
type          = "regex"
# Matches the percentage in "Bytes scrubbed: 13.76GiB  (48.59%)"
# command_regex stops before the device/mount path, so it matches any target.
pattern       = 'Bytes scrubbed:.*\((\d+(?:\.\d+)?)%\)'
group         = 1

# Generic catch-all: matches any command whose output contains "Progress: X%"
[[parsers]]
command_regex = ''
type          = "regex"
pattern       = 'Progress:\s*(\d+(?:\.\d+)?)\s*%'
group         = 1
